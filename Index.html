<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla | Electric Cars, Solar & Clean Energy</title>
    <link rel="icon" href="free_flow.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tesla-red: #E82127;
            --tesla-dark: #000000;
            --tesla-gray: #393C41;
            --tesla-light: #F4F4F4;
            --tesla-white: #FFFFFF;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--tesla-dark);
            color: var(--tesla-white);
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            background: transparent;
        }

        .nav.scrolled {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 0.75rem 2.5rem;
        }

        .nav-logo svg {
            width: 120px;
            height: auto;
            fill: white;
            cursor: pointer;
        }

        .nav-center {
            display: flex;
            gap: 2.5rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-link {
            color: var(--tesla-white);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
            cursor: pointer;
            text-transform: capitalize;
            position: relative;
        }

        .nav-link:hover {
            opacity: 0.7;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--tesla-white);
            transition: width 0.3s;
        }

        .nav-link.active::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-icon {
            color: var(--tesla-white);
            font-size: 1.25rem;
            cursor: pointer;
            transition: opacity 0.3s;
            position: relative;
            background: none;
            border: none;
        }

        .nav-icon:hover {
            opacity: 0.7;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--tesla-red);
            color: white;
            font-size: 0.625rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero Sections - Full Screen */
        .hero-section {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            overflow: hidden;
            scroll-snap-align: start;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }

        .hero-content {
            margin-top: 16vh;
            z-index: 1;
            animation: fadeInUp 1s ease;
            max-width: 900px;
            padding: 0 2rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.95;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 4rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 280px;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.9);
            color: var(--tesla-dark);
        }

        .btn-primary:hover {
            background: var(--tesla-white);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: rgba(23, 26, 32, 0.8);
            color: var(--tesla-white);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(23, 26, 32, 1);
            transform: scale(1.02);
        }

        .hero-footer {
            margin-bottom: 8vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .scroll-indicator {
            animation: bounce 2s infinite;
            cursor: pointer;
            color: white;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Category Reveal Overlay */
        .category-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .category-overlay.active {
            display: flex;
            opacity: 1;
        }

        .category-header {
            padding: 6rem 4rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .category-title-group h2 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .category-title-group p {
            color: #888;
            font-size: 1rem;
        }

        .close-category {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-category:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* Products Grid */
        .products-container {
            padding: 3rem 4rem;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: linear-gradient(145deg, #111, #1a1a1a);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .product-image-wrapper {
            position: relative;
            height: 300px;
            overflow: hidden;
            background: #0a0a0a;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-badge {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: var(--tesla-red);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        .product-badge.new {
            background: #10b981;
        }

        .product-badge.popular {
            background: #f59e0b;
        }

        .product-info {
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--tesla-red);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .product-name {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .product-tagline {
            font-size: 1rem;
            color: #888;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .product-specs {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            padding: 1.25rem 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .spec {
            text-align: left;
            flex: 1;
        }

        .spec-value {
            display: block;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--tesla-white);
            margin-bottom: 0.25rem;
        }

        .spec-label {
            font-size: 0.6875rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-price-section {
            margin-top: auto;
        }

        .price-display {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .price-amount {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .price-note {
            font-size: 0.875rem;
            color: #666;
        }

        .lease-info {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .lease-text {
            font-size: 0.875rem;
            color: #888;
        }

        .lease-price {
            font-weight: 700;
            color: var(--tesla-red);
            font-size: 1.125rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-order {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-order-primary {
            background: var(--tesla-white);
            color: var(--tesla-dark);
        }

        .btn-order-primary:hover {
            background: var(--tesla-red);
            color: white;
            transform: scale(1.02);
        }

        .btn-order-secondary {
            background: transparent;
            color: var(--tesla-white);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-order-secondary:hover {
            background: var(--tesla-white);
            color: var(--tesla-dark);
            border-color: var(--tesla-white);
        }

        /* Cart Sidebar */
        .cart-overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cart-overlay-bg.open {
            display: block;
            opacity: 1;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            height: 100vh;
            background: #111;
            z-index: 3001;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
        }

        .cart-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .cart-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .cart-close:hover {
            background: rgba(255,255,255,0.1);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .cart-empty i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .cart-item {
            display: flex;
            gap: 1.25rem;
            padding: 1.25rem;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .cart-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }

        .cart-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-category {
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tesla-red);
            margin-bottom: 0.25rem;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: #888;
            font-size: 0.9375rem;
            margin-bottom: 0.75rem;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .qty-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .remove-item {
            color: #666;
            cursor: pointer;
            padding: 0.5rem;
            margin-left: auto;
            transition: all 0.3s;
            border-radius: 8px;
        }

        .remove-item:hover {
            color: var(--tesla-red);
            background: rgba(232, 33, 39, 0.1);
        }

        .cart-footer {
            padding: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .cart-summary {
            margin-bottom: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.9375rem;
            color: #888;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--tesla-white);
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 0.75rem;
        }

        .checkout-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.125rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
